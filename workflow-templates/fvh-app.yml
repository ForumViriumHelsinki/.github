name: FVH App CI/CD

on:
  push:
    branches: [main]
    tags:
      - '*-v*.*.*'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Build and push :next-{version} image on release-please PRs.
  # The release job promotes this image instead of rebuilding on tag push.
  build:
    if: startsWith(github.head_ref, 'release-please--branches--main')
    uses: ForumViriumHelsinki/.github/.github/workflows/reusable-container-build.yml@main
    with:
      image-name: forumviriumhelsinki/${{ github.event.repository.name }}
      # version-command: "jq -r '.version' package.json"  # default; adjust for Python etc.

  # Promote the pre-built PR image to release tags on tag push.
  # Falls back to a full rebuild if the pre-built image is not found.
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    uses: ForumViriumHelsinki/.github/.github/workflows/reusable-container-release.yml@main
    with:
      image-name: forumviriumhelsinki/${{ github.event.repository.name }}
      tag-prefix: ${{ github.event.repository.name }}-v

  # Automated releases via release-please
  release-please:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ForumViriumHelsinki/.github/.github/workflows/reusable-release-please.yml@main
    secrets:
      RELEASE_PLEASE_TOKEN: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}

  # Auto-merge ArgoCD Image Updater PRs
  auto-merge:
    if: github.event_name == 'pull_request'
    uses: ForumViriumHelsinki/.github/.github/workflows/reusable-auto-merge-image-updater.yml@main
    secrets:
      AUTO_MERGE_PAT: ${{ secrets.AUTO_MERGE_PAT }}

  # Security scan on PRs
  security:
    if: github.event_name == 'pull_request'
    uses: ForumViriumHelsinki/.github/.github/workflows/reusable-security-owasp.yml@main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
